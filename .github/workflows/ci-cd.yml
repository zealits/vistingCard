name: Node.js CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Node.js environment
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      # Step 3: Install server dependencies
      - name: Install server dependencies
        run: npm ci
        working-directory: ./server

      # Step 4: Install frontend dependencies
      - name: Install frontend dependencies
        run: npm ci
        working-directory: ./frontend

      # Step 5: Build the frontend application
      - name: Build frontend application
        run: npm run build
        working-directory: ./frontend

      # Step 6: Setup SSH for Deployment
      - name: Setup SSH
        if: github.ref == 'refs/heads/main'
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 154.53.42.27 >> ~/.ssh/known_hosts

      # Step 7: Deploy to the server
      - name: Deploy to server
        if: github.ref == 'refs/heads/main'
        run: |
          ssh admin@154.53.42.27 << 'EOF'
          echo "🔐 Starting deployment to remote server"

          if [ -f ~/visitingCard/server/.env ]; then
            echo "📁 Backing up existing .env file"
            cp ~/visitingCard/server/.env ~/.env.bak
          fi

          if [ -d ~/visitingCard ]; then
            echo "📂 Pulling latest changes from Git"
            cd ~/visitingCard
            git reset --hard
            git pull origin main
          else
            echo "📂 Cloning repository"
            git clone https://github.com/zealits/vistingCard.git ~/visitingCard
            cd ~/visitingCard
          fi

          if [ -f ~/.env.bak ]; then
            echo "♻️ Restoring .env from backup"
            mv ~/.env.bak ~/visitingCard/server/.env
          fi

          echo "📦 Installing server dependencies"
          cd ~/visitingCard/server
          npm install

          cd ../frontend
          echo "📦 Installing frontend dependencies"
          npm install
          echo "🛠️ Building frontend"
          npm run build

          cd ../server
          echo "🚀 Starting or restarting PM2 process"
          if pm2 list | grep -q "visitingcard"; then
            echo "🔁 Restarting visitingcard"
            pm2 restart visitingcard
          else
            echo "▶️ Starting visitingcard"
            pm2 start npm --name "visitingcard" -- run dev
          fi

          echo "📋 PM2 process list:"
          pm2 list
          EOF
